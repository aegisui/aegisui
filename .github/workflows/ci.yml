name: CI

# `pull_request` SIN filtro `branches:` a propósito (ADR-021): dispara contra
# CUALQUIER rama base, no solo main. Con el filtro anterior (`branches: [main]`),
# un PR apilado sobre otra rama se quedaba literalmente SIN NINGÚN check —
# "no checks reported"— y en silencio. Un PR sin checks es peor que uno en rojo:
# parece aprobable y no ha verificado nada. Es la versión más pura del
# verde-falso que SPEC §13 prohíbe.
#
# `push` sí se queda acotado a main: es el build de la rama principal, y sin el
# filtro cada push a cada rama duplicaría el trabajo que ya hace el PR.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Un job por cada gate de §9.2. Los `name:` son estables y explícitos: son
# literalmente lo que se fija como required en el ruleset de protección de rama.
# NO renombrar un job una vez fijado como required: GitHub esperaría eternamente
# un check que ya no existe.
#
# Regla anti-verde-falso (SPEC §13): ningún job pasa en verde sin haber analizado
# algo. Los gates DOM (a11y, contrast, keyboard, target-size, visual, contracts)
# tienen como objetivo los FIXTURES good/bad (ADR-013): cada uno corre en las dos
# direcciones (pasa sobre good/, falla sobre bad/) vía scripts/gates/run.mjs. Los
# fixtures se quedan para siempre; cuando lleguen componentes reales, los gates
# los analizarán A ELLOS ADEMÁS DE a los fixtures, sin tocar el `name:` del job.
#
# `storybook-build` es la ÚNICA excepción deliberada a "todo job de este archivo
# es required": es tooling de documentación con fricción de versiones propia
# (ADR-017), no un verificador de corrección — no cazar ninguna violación que los
# gates de arriba no cacen ya. Metida en el ruleset como required, un rojo suyo
# significaría a veces "Storybook desactualizado" y a veces "producto roto": exactamente
# lo que la regla anti-verde-falso existe para evitar. `continue-on-error: true` y
# el sufijo "(non-blocking)" en el nombre son a propósito, para que nadie la
# confunda con un gate ni la "promueva" a required sin releer esto.

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm lint
      - run: pnpm format:check

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm nx run-many -t test

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm nx run-many -t build

  size:
    name: size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm nx run-many -t build
      - run: pnpm size

  peer-floor:
    name: peer-floor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm nx run-many -t build
      - run: pnpm peer-floor

  # `publish-smoke` verifica los ARTEFACTOS desde un consumidor externo real
  # (issue #19): empaqueta, instala con npm en un proyecto FUERA del monorepo,
  # ejecuta `aegisui add button` y typechequea los 5 componentes. Es la única
  # forma válida de comprobarlo: dentro del repo, el fallback del CLI siempre
  # salva la papeleta y pnpm siempre resuelve `workspace:` — por eso los cinco
  # componentes reportaban "CLI ✓" con ADR-003 roto.
  publish-smoke:
    name: publish-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm nx run-many -t build
      - run: pnpm publish-smoke

  # `contracts` corre la reconciliación contrato<->componente sobre los fixtures
  # (dos direcciones) y, "además de", sobre packages/ui cuando existan (Fase 3).
  contracts:
    name: contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: node scripts/gates/run.mjs contracts

  # Los gates DOM que necesitan render REAL corren en dos partes, sin renombrar el
  # job: (1) el canario estático de fixtures good/bad (ADR-013, anti-verde-falso de
  # los raíles) y (2) el Button real en Chromium vía Playwright contra el sandbox
  # (fuente de verdad = getComputedStyle/bounding box del navegador). `keyboard`
  # se queda estático: su comportamiento lo validan los tests user-event de ui.
  a11y:
    name: a11y
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: node scripts/gates/run.mjs a11y
      - run: pnpm nx run tokens:build
      - run: pnpm exec playwright install --with-deps chromium
      - name: a11y del Button real (Chromium)
        working-directory: apps/sandbox
        run: pnpm exec playwright test gate-a11y

  contrast:
    name: contrast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: node scripts/gates/run.mjs contrast
      - run: pnpm nx run tokens:build
      - run: pnpm exec playwright install --with-deps chromium
      - name: contraste del Button real (Chromium)
        working-directory: apps/sandbox
        run: pnpm exec playwright test gate-contrast

  keyboard:
    name: keyboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: node scripts/gates/run.mjs keyboard

  target-size:
    name: target-size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: node scripts/gates/run.mjs target-size
      - run: pnpm nx run tokens:build
      - run: pnpm exec playwright install --with-deps chromium
      - name: target-size del Button real (Chromium)
        working-directory: apps/sandbox
        run: pnpm exec playwright test gate-target-size

  visual:
    name: visual
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: node scripts/gates/run.mjs visual
      - run: pnpm nx run tokens:build
      - run: pnpm exec playwright install --with-deps chromium
      - name: visual del Button real (estilos computados, Chromium)
        working-directory: apps/sandbox
        run: pnpm exec playwright test gate-visual

  # Informativo, NO required (ver comentario de cabecera y ADR-017). Solo
  # construye: cero deps runtime, cero superficie de corrección que no cubran
  # ya los gates de arriba. `continue-on-error` para que un rojo se vea como
  # advertencia (⚠), nunca como el X rojo de un gate real.
  storybook-build:
    name: 'storybook-build (non-blocking)'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm nx run tokens:build
      - run: pnpm storybook:build

  changeset:
    name: changeset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: changeset (solo si el PR toca packages/**)
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "El gate changeset se evalúa en PRs; nada que comprobar en push."
            exit 0
          fi
          BASE="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=1
          if git diff --name-only "$BASE...HEAD" | grep -q '^packages/'; then
            echo "El PR toca packages/**: se exige changeset."
            pnpm changeset status --since="$BASE"
          else
            echo "El PR no toca packages/**: changeset no requerido."
          fi
