name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Un job por cada gate de §9.2. Los `name:` son estables y explícitos: son
# literalmente lo que se fija como required en el ruleset de protección de rama.
# NO renombrar un job una vez fijado como required: GitHub esperaría eternamente
# un check que ya no existe.
#
# Regla anti-verde-falso (SPEC §13): ningún job pasa en verde sin haber analizado
# algo. Los gates que aún no tienen objetivos (a11y, contrast, keyboard,
# target-size, visual, contracts) FALLAN a propósito hasta que su fase los
# implemente; entonces se reemplaza el comando del job por el gate real, sin
# tocar su `name:`.

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm lint
      - run: pnpm format:check

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm nx run-many -t test

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm nx run-many -t build

  size:
    name: size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm nx run-many -t build
      - run: pnpm size

  peer-floor:
    name: peer-floor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm nx run-many -t build
      - run: pnpm peer-floor

  contracts:
    name: contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm contracts

  a11y:
    name: a11y
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: node scripts/pending-gate.mjs a11y 3

  contrast:
    name: contrast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: node scripts/pending-gate.mjs contrast 2

  keyboard:
    name: keyboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: node scripts/pending-gate.mjs keyboard 3

  target-size:
    name: target-size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: node scripts/pending-gate.mjs target-size 3

  visual:
    name: visual
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: node scripts/pending-gate.mjs visual 3

  changeset:
    name: changeset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: changeset (solo si el PR toca packages/**)
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "El gate changeset se evalúa en PRs; nada que comprobar en push."
            exit 0
          fi
          BASE="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=1
          if git diff --name-only "$BASE...HEAD" | grep -q '^packages/'; then
            echo "El PR toca packages/**: se exige changeset."
            pnpm changeset status --since="$BASE"
          else
            echo "El PR no toca packages/**: changeset no requerido."
          fi
